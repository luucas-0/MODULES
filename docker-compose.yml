version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: capi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: capi_user
      POSTGRES_PASSWORD: capi_password
      POSTGRES_DB: capi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: